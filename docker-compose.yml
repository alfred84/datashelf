services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.docker
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - datashelf-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U datashelf']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file:
      - .env.docker
    ports:
      - '6379:6379'
    networks:
      - datashelf-net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.docker
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads
    networks:
      - datashelf-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env.docker
    volumes:
      - uploads:/app/uploads
    networks:
      - datashelf-net
    profiles:
      - worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - .env.docker
    ports:
      - '4200:80'
    networks:
      - datashelf-net
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  uploads:

networks:
  datashelf-net:
    driver: bridge
