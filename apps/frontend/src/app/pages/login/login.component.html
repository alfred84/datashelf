<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-bold tracking-tight text-gray-900">Welcome back</h1>
      <p class="mt-1 text-sm text-muted">Sign in to your DataShelf account</p>
    </div>

    <app-card padding="lg">
      @if (error()) {
        <app-alert type="error" class="mb-5 block">{{ error() }}</app-alert>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <app-form-field label="Email" fieldId="email" [required]="true">
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            class="block w-full rounded-lg border border-border bg-surface px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
            placeholder="you@example.com"
          />
        </app-form-field>

        <app-form-field label="Password" fieldId="password" [required]="true">
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            class="block w-full rounded-lg border border-border bg-surface px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
            placeholder="Enter your password"
          />
        </app-form-field>

        <app-button type="submit" [loading]="loading()" class="block w-full">
          {{ loading() ? 'Signing in...' : 'Sign in' }}
        </app-button>
      </form>
    </app-card>

    <p class="mt-6 text-center text-sm text-muted">
      Don't have an account?
      <a routerLink="/register" class="font-semibold text-primary-600 hover:text-primary-700 transition-colors">Create one</a>
    </p>
  </div>
</div>
