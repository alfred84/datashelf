<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-bold tracking-tight text-gray-900">Create your account</h1>
      <p class="mt-1 text-sm text-muted">Start managing your CSV files with DataShelf</p>
    </div>

    <app-card padding="lg">
      @if (error()) {
        <app-alert type="error" class="mb-5 block">{{ error() }}</app-alert>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <app-form-field label="Email" fieldId="reg-email" [required]="true">
          <input
            id="reg-email"
            type="email"
            [(ngModel)]="email"
            name="email"
            required
            class="block w-full rounded-lg border border-border bg-surface px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
            placeholder="you@example.com"
          />
        </app-form-field>

        <app-form-field label="Password" fieldId="reg-password" [required]="true">
          <input
            id="reg-password"
            type="password"
            [(ngModel)]="password"
            name="password"
            required
            minlength="8"
            class="block w-full rounded-lg border border-border bg-surface px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
            placeholder="Min. 8 characters"
          />
        </app-form-field>

        <app-form-field label="Confirm password" fieldId="reg-confirm" [required]="true">
          <input
            id="reg-confirm"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            class="block w-full rounded-lg border border-border bg-surface px-3.5 py-2.5 text-sm text-gray-900 placeholder:text-gray-400 focus:border-primary-500 focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
            placeholder="Repeat your password"
          />
        </app-form-field>

        <app-button type="submit" [loading]="loading()" class="block w-full">
          {{ loading() ? 'Creating account...' : 'Create account' }}
        </app-button>
      </form>
    </app-card>

    <p class="mt-6 text-center text-sm text-muted">
      Already have an account?
      <a routerLink="/login" class="font-semibold text-primary-600 hover:text-primary-700 transition-colors">Sign in</a>
    </p>
  </div>
</div>
